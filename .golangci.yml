version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    # Security
    - gosec
    # Default linters (explicit list for clarity)
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    # Additional useful linters
    - gocritic
    - revive

formatters:
  enable:
    - gofmt
    - goimports

linters-settings:
  gosec:
    # Don't fail on medium/low severity issues
    severity: high
    confidence: medium
