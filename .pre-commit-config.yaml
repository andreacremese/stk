repos:
  # Security scanning
  - repo: local
    hooks:
      - id: semgrep-secrets
        name: semgrep p/secrets
        entry: semgrep --config "p/secrets" --error
        language: system
        types: [text]
      - id: semgrep-security-audit
        name: semgrep p/security-audit
        entry: semgrep --config "p/security-audit" --error
        language: system
        types: [text]
      - id: semgrep-ci
        name: semgrep p/ci
        entry: semgrep --config "p/ci" --error
        language: system
        types: [text]
      - id: ggshield
        name: ggshield secret scan
        entry: ggshield secret scan pre-commit
        language: system
        types: [text]

  # Go linting and formatting
  - repo: local
    hooks:
      - id: golangci-lint-local
        name: golangci-lint
        entry: golangci-lint run
        language: system
        types: [go]
        pass_filenames: false

  # Go-specific checks
  - repo: https://github.com/tekwizely/pre-commit-golang
    rev: v1.0.0-rc.1
    hooks:
      - id: go-mod-tidy

  # General hygiene checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: detect-private-key
      - id: check-added-large-files
        args: ['--maxkb=1000']
